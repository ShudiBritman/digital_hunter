services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_KRAFT_MODE: 'true'

      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    volumes:
      - kafka_kraft:/var/lib/kafka/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 5s
      timeout: 5s
      retries: 15


    networks:
      - backend

  intel-service:
    build: ./intel_service
    container_name: intel-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092

      ELASTIC_HOST: elasticsearch
      ELASTIC_PORT: 9200

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: 'test'
      MYSQL_PASS: 'pass'
      MYSQL_DATABASE: digital_hunter
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_health

    networks:
      - backend

  attack-service:
    build: ./attack_service
    container_name: attack-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092

      ELASTIC_HOST: elasticsearch
      ELASTIC_PORT: 9200

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: 'test'
      MYSQL_PASS: 'pass'
      MYSQL_DATABASE: digital_hunter
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_health

    networks:
      - backend
      
  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 5s
      timeout: 5s
      retries: 20


  kibana:
    image: kibana:7.17.10
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - backend

  mysql:
    container_name: mysql
    restart: always
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: 'test_pass'
      MYSQL_USER: 'test'
      MYSQL_PASS: 'pass'
      MYSQL_DATABASE: digital_hunter
    volumes_from:
      - data
    ports:
      - "3306:3306"
    healthcheck: 
        test: ["CMD", "curl", "-f", "http://localhost:3306"] 
        interval: 30s 
        timeout: 10s 
        retries: 5 

networks:
  backend:
    driver: bridge
volumes:
  kafka_kraft:
